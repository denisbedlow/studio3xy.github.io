<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Studio3xy</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <h1>Studio3xy</h1>
            <p class="subtitle">Admin login</p>

            <div id="status" class="status"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
            </div>

            <button id="loginBtn" class="btn btn-primary" onclick="login()">Sign In</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../supabase-config.js"></script>
    <script>
        // Redirect if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'upload.html';
        });

        async function login() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');

            if (!email || !password) {
                showStatus('Please enter your email and password.', 'error');
                return;
            }

            btn.disabled = true;
            showStatus('Signing in…', 'info');

            try {
                // 10-second timeout so it never hangs silently
                const timeout = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('Request timed out — check your network connection.')), 10000)
                );

                const { error } = await Promise.race([
                    supabase.auth.signInWithPassword({ email, password }),
                    timeout
                ]);

                if (error) {
                    showStatus(error.message, 'error');
                    btn.disabled = false;
                } else {
                    window.location.href = 'upload.html';
                }
            } catch (err) {
                showStatus(err.message, 'error');
                btn.disabled = false;
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
