<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Tracking - Studio3xy</title>
    <link rel="stylesheet" href="/styles.css">
    <meta name="description" content="Real-time eye gaze tracking overlaid on a cityscape image, powered by MediaPipe Face Mesh. All processing runs in your browser.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous" integrity="sha384-q1KhAZhJcJXr3zfC3Tz07pBqQSabwFIZhXlmlUAB8s0zk4ETWERkIKGBCFQ5Jc3e"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1675466023/control_utils.js" crossorigin="anonymous" integrity="sha384-thKklr83mMkmn5Oz6g4Hjh6DDhvg7+2drGC/ftFqIvpCagFo9sKRttSmILlAEhjO"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous" integrity="sha384-W/7NVG2tfN12ld8faSFVOZ/W4UHFHze98GqEUPTl8EjY9QDwCKQIzoCHp8/IlIIr"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous" integrity="sha384-nKiz5QrpRlMQLw5nrZcprT7N9vmmAcIgV8TuGuep4x91V4JIPsXa+D44Wxj0guoa"></script>
</head>
<body>
    <div class="fullscreen-container">
        <img id="cityscape" src="https://images.unsplash.com/photo-1444723121867-7a241cacace9?w=1920&auto=format&fit=crop&q=80" alt="Aerial view of a city skyline at sunset used as the eye tracking target image" loading="lazy">
        <canvas id="overlay"></canvas>

        <div class="controls">
            <button id="startBtn" onclick="startTracking()">Start Tracking</button>
            <button id="stopBtn" onclick="stopTracking()" disabled>Stop Tracking</button>
            <button id="clearBtn" onclick="clearOverlay()">Clear Overlay</button>
        </div>

        <div id="status" class="status">Click "Start Tracking" to begin</div>
    </div>

    <div class="back-link back-link--overlay">
        <a href="/eyetracking/">← Back</a>
    </div>

    <script src="/eye-tracking.js"></script>
</body>
</html>
