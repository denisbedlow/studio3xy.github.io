<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch – Studio3xy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
        }

        /* ── Consent banner ── */
        #consent {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        #consent.hidden { display: none; }

        .consent-card {
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            text-align: center;
        }

        .consent-card h2 { font-size: 1.4rem; margin-bottom: 0.75rem; }

        .consent-card p {
            font-size: 0.9rem;
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .consent-btns { display: flex; gap: 1rem; justify-content: center; }

        .consent-btns button {
            padding: 0.65rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        #allowBtn { background: #3498db; color: #fff; }
        #skipBtn  { background: #333;    color: #ccc; }

        /* ── Player: flex column so controls sit BELOW the video ── */
        #player-wrap {
            position: fixed;
            inset: 0;
            display: none;          /* shown as flex by showPlayer() */
            flex-direction: column;
        }

        /* Video area fills all remaining space */
        #video-area {
            flex: 1;
            min-height: 0;          /* allow flex child to shrink */
            position: relative;
            background: #000;
        }

        #video-area video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;    /* aspect ratio preserved, black bars on sides */
        }

        /* Gaze canvas covers exactly the video area */
        #gazeCanvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* ── Custom controls bar ── */
        #controls {
            flex-shrink: 0;
            height: 52px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            user-select: none;
        }

        #controls button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            opacity: 0.85;
            flex-shrink: 0;
        }

        #controls button:hover { opacity: 1; }

        /* Progress track */
        #progressTrack {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        #progressTrack:hover { height: 6px; }

        #progressFill {
            height: 100%;
            width: 0%;
            background: #3498db;
            border-radius: 2px;
            pointer-events: none;
        }

        /* Time display */
        .time {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        /* Volume slider */
        #volumeSlider {
            width: 70px;
            accent-color: #3498db;
            flex-shrink: 0;
        }

        /* Tracking status */
        #statusBar {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            color: rgba(255,255,255,0.35);
            pointer-events: none;
            white-space: nowrap;
        }

        /* ── Error / loading ── */
        #message {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- Consent banner -->
    <div id="consent">
        <div class="consent-card">
            <h2>Enable Eye Tracking</h2>
            <p>
                This video uses your webcam to record where you look while watching.
                Gaze data is stored anonymously and only visible to the video creator.
                You can watch without tracking if you prefer.
            </p>
            <div class="consent-btns">
                <button id="allowBtn" onclick="startWithTracking()">Allow &amp; Watch</button>
                <button id="skipBtn"  onclick="startWithoutTracking()">Watch without tracking</button>
            </div>
        </div>
    </div>

    <!-- Video player -->
    <div id="player-wrap">

        <!-- Video area (fills all space above controls) -->
        <div id="video-area">
            <video id="video" playsinline></video>   <!-- no controls attribute -->
            <canvas id="gazeCanvas"></canvas>
            <div id="statusBar"></div>
        </div>

        <!-- Custom controls bar (below, never overlapping) -->
        <div id="controls">

            <!-- Play / Pause -->
            <button id="playBtn" onclick="togglePlay()" title="Play / Pause">
                <svg id="iconPlay"  viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <!-- Current time -->
            <span class="time" id="currentTime">0:00</span>

            <!-- Progress bar -->
            <div id="progressTrack" onmousedown="startSeek(event)" ontouchstart="startSeek(event)">
                <div id="progressFill"></div>
            </div>

            <!-- Duration -->
            <span class="time" id="durationTime">0:00</span>

            <!-- Mute / Volume -->
            <button id="muteBtn" onclick="toggleMute()" title="Mute">
                <svg id="iconVol"  viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg id="iconMute" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>

            <input type="range" id="volumeSlider" min="0" max="1" step="0.02" value="1" oninput="setVolume(this.value)">

            <!-- Fullscreen -->
            <button onclick="toggleFullscreen()" title="Fullscreen">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>

        </div>
    </div>

    <div id="message">Loading video…</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        // ── State ────────────────────────────────────────────────────────────────

        const videoEl    = document.getElementById('video');
        const gazeCanvas = document.getElementById('gazeCanvas');
        const gazeCtx    = gazeCanvas.getContext('2d');
        const playerWrap = document.getElementById('player-wrap');
        const messageEl  = document.getElementById('message');
        const statusEl   = document.getElementById('statusBar');

        let videoId    = null;
        let sessionId  = null;
        let tracking   = false;
        let isSeeking  = false;

        // Tracking state
        let gazeHistory      = [];
        let smoothedGaze     = null;
        let eyeClosedFrames  = 0;
        let lastBlinkTime    = 0;
        let lastGazeSampleTime = -1;

        const FLUSH_INTERVAL = 10000;
        const GAZE_SAMPLE_MS = 500;

        let gazeBuf    = [];
        let blinkBuf   = [];
        let flushTimer = null;

        let faceMesh    = null;
        let trackerCam  = null;
        let cameraVideo = null;

        // ── Init: load video from Supabase ────────────────────────────────────────

        (async () => {
            const params = new URLSearchParams(location.search);
            videoId = params.get('v');

            if (!videoId) { showMessage('No video specified.'); hideConsent(); return; }

            const { data, error } = await supabase
                .from('videos')
                .select('title, storage_path, is_public')
                .eq('id', videoId)
                .single();

            if (error || !data)      { showMessage('Video not found.');                hideConsent(); return; }
            if (!data.is_public)     { showMessage('This video is not publicly available.'); hideConsent(); return; }

            const { data: urlData } = supabase.storage.from('videos').getPublicUrl(data.storage_path);
            videoEl.src = urlData.publicUrl;
            document.title = data.title + ' – Studio3xy';
            hideMessage();
        })();

        // ── Consent ───────────────────────────────────────────────────────────────

        async function startWithTracking() {
            hideConsent();
            showPlayer();

            const { data: row, error } = await supabase
                .from('sessions')
                .insert({ video_id: videoId, user_agent: navigator.userAgent })
                .select('id')
                .single();

            if (error || !row) { setStatus('Watching without tracking.'); return; }
            sessionId = row.id;

            await loadMediaPipe();
            await initTracking();
        }

        function startWithoutTracking() {
            hideConsent();
            showPlayer();
        }

        // ── Custom controls ───────────────────────────────────────────────────────

        function togglePlay() {
            videoEl.paused ? videoEl.play() : videoEl.pause();
        }

        videoEl.addEventListener('play',  () => {
            document.getElementById('iconPlay').style.display  = 'none';
            document.getElementById('iconPause').style.display = '';
        });
        videoEl.addEventListener('pause', () => {
            document.getElementById('iconPlay').style.display  = '';
            document.getElementById('iconPause').style.display = 'none';
        });
        videoEl.addEventListener('ended', () => {
            document.getElementById('iconPlay').style.display  = '';
            document.getElementById('iconPause').style.display = 'none';
            flushData();
        });

        videoEl.addEventListener('loadedmetadata', () => {
            document.getElementById('durationTime').textContent = formatTime(videoEl.duration);
        });

        videoEl.addEventListener('timeupdate', () => {
            if (isSeeking) return;
            const pct = videoEl.duration ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('currentTime').textContent  = formatTime(videoEl.currentTime);
        });

        // Seek by clicking / dragging the progress bar
        function startSeek(e) {
            isSeeking = true;
            doSeek(e);
            const move = e.touches ? 'touchmove' : 'mousemove';
            const up   = e.touches ? 'touchend'  : 'mouseup';
            const onMove = (ev) => doSeek(ev);
            const onUp   = ()   => { isSeeking = false; document.removeEventListener(move, onMove); document.removeEventListener(up, onUp); };
            document.addEventListener(move, onMove);
            document.addEventListener(up,   onUp);
        }

        function doSeek(e) {
            const track  = document.getElementById('progressTrack');
            const rect   = track.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const pct    = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            document.getElementById('progressFill').style.width = (pct * 100) + '%';
            if (videoEl.duration) videoEl.currentTime = pct * videoEl.duration;
        }

        function toggleMute() {
            videoEl.muted = !videoEl.muted;
            document.getElementById('iconVol').style.display  = videoEl.muted ? 'none' : '';
            document.getElementById('iconMute').style.display = videoEl.muted ? ''     : 'none';
            document.getElementById('volumeSlider').value     = videoEl.muted ? 0 : videoEl.volume;
        }

        function setVolume(v) {
            videoEl.volume = v;
            videoEl.muted  = (v == 0);
            document.getElementById('iconVol').style.display  = videoEl.muted ? 'none' : '';
            document.getElementById('iconMute').style.display = videoEl.muted ? ''     : 'none';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerWrap.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        // Click on video area = play / pause
        document.getElementById('video-area').addEventListener('click', togglePlay);

        function formatTime(s) {
            if (isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60).toString().padStart(2, '0');
            return m + ':' + sec;
        }

        // ── MediaPipe dynamic load ────────────────────────────────────────────────

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src; s.crossOrigin = 'anonymous';
                s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        async function loadMediaPipe() {
            const cdn = 'https://cdn.jsdelivr.net/npm/@mediapipe';
            await loadScript(`${cdn}/camera_utils/camera_utils.js`);
            await loadScript(`${cdn}/control_utils/control_utils.js`);
            await loadScript(`${cdn}/drawing_utils/drawing_utils.js`);
            await loadScript(`${cdn}/face_mesh/face_mesh.js`);
            await loadScript('eyetracking/tracker-core.js');
        }

        // ── Tracking init ─────────────────────────────────────────────────────────

        async function initTracking() {
            try {
                setStatus('Starting eye tracking…');
                cameraVideo = document.createElement('video');
                cameraVideo.style.display = 'none';
                document.body.appendChild(cameraVideo);

                faceMesh   = createFaceMesh(onResults);
                trackerCam = createCamera(cameraVideo, faceMesh, () => tracking);
                await trackerCam.start();

                tracking = true;
                flushTimer = setInterval(flushData, FLUSH_INTERVAL);

                document.addEventListener('visibilitychange', () => { if (document.hidden) flushData(); });

                const resizeCanvas = () => {
                    gazeCanvas.width  = gazeCanvas.offsetWidth;
                    gazeCanvas.height = gazeCanvas.offsetHeight;
                };
                new ResizeObserver(resizeCanvas).observe(gazeCanvas);
                resizeCanvas();

                setStatus('Eye tracking active');
            } catch (err) {
                setStatus('Could not start camera: ' + err.message);
            }
        }

        // ── FaceMesh results ──────────────────────────────────────────────────────

        function onResults(results) {
            gazeCtx.clearRect(0, 0, gazeCanvas.width, gazeCanvas.height);
            if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) return;

            const landmarks = results.multiFaceLandmarks[0];

            const raw = computeRawGaze(landmarks);
            if (raw) {
                const state  = applyFilters(raw, gazeHistory, smoothedGaze);
                gazeHistory  = state.gazeHistory;
                smoothedGaze = state.smoothedGaze;
                const screen = rawToScreen(smoothedGaze, null);

                const gx = screen.x * gazeCanvas.width;
                const gy = screen.y * gazeCanvas.height;
                gazeCtx.beginPath();
                gazeCtx.arc(gx, gy, 8, 0, Math.PI * 2);
                gazeCtx.fillStyle = 'rgba(255, 80, 80, 0.4)';
                gazeCtx.fill();

                const vt = videoEl.currentTime;
                if (!videoEl.paused && vt - lastGazeSampleTime >= GAZE_SAMPLE_MS / 1000) {
                    lastGazeSampleTime = vt;
                    gazeBuf.push({ session_id: sessionId, t: vt, x: screen.x, y: screen.y });
                }
            }

            const blinkResult = detectBlink(landmarks, eyeClosedFrames);
            eyeClosedFrames = blinkResult.eyeClosedFrames;
            if (blinkResult.blinked) {
                const now = Date.now();
                if (now - lastBlinkTime > 500) {
                    lastBlinkTime = now;
                    if (!videoEl.paused) blinkBuf.push({ session_id: sessionId, t: videoEl.currentTime });
                }
            }
        }

        // ── Data flush ────────────────────────────────────────────────────────────

        async function flushData() {
            if (!sessionId) return;
            const gaze   = gazeBuf.splice(0);
            const blinks = blinkBuf.splice(0);
            if (gaze.length)   await supabase.from('gaze_points').insert(gaze);
            if (blinks.length) await supabase.from('blinks').insert(blinks);
        }

        // ── UI helpers ────────────────────────────────────────────────────────────

        function hideConsent() { document.getElementById('consent').classList.add('hidden'); }
        function showPlayer()  { playerWrap.style.display = 'flex'; hideMessage(); }
        function showMessage(t){ messageEl.textContent = t; messageEl.style.display = 'flex'; }
        function hideMessage() { messageEl.style.display = 'none'; }
        function setStatus(t)  { statusEl.textContent = t; }
    </script>
</body>
</html>
